<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111128;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)" />
  <!-- Border glow -->
  <rect width="64" height="64" rx="12" fill="none" stroke="url(#hGrad)" stroke-width="1.5" opacity="0.5" />
  <!-- Letter H -->
  <text
    x="32"
    y="46"
    font-family="'Inter', 'Outfit', Arial, sans-serif"
    font-size="40"
    font-weight="900"
    text-anchor="middle"
    fill="url(#hGrad)"
    letter-spacing="-1"
  >H</text>
</svg>
